name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v4
      - name: Read version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build both Minecraft versions
        run: ./gradlew build -Pmod_version=${{ steps.version.outputs.version }}
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            mc1.21.11/build/libs/do-not-render-the-helmet-1.21.11-${{ steps.version.outputs.version }}.jar
            mc26.2/build/libs/do-not-render-the-helmet-26.2-${{ steps.version.outputs.version }}.jar
