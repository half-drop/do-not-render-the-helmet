name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build both Minecraft versions
        run: ./gradlew build
      - uses: actions/upload-artifact@v4
        with:
          name: mod-jars
          path: |
            mc1.21.11/build/libs/do-not-render-the-helmet-1.21.11-1.0.1.jar
            mc26.2/build/libs/do-not-render-the-helmet-26.2-1.0.1.jar
